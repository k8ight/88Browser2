<!DOCTYPE html>
	<head>
		<meta charset="utf-8">
		<meta name='viewport' content='width=device-width, initial-scale=1.0'>
		<link rel="stylesheet" media="all" type="text/css" href="./sudokuJS.css">
		<style>
			* {
				margin:0; padding:0;
				-moz-box-sizing: border-box;
				-webkit-box-sizing: border-box;
				box-sizing: border-box;
			}
			.wrap {
				padding: 2em 1em;
				width: 400px;
				max-width: 100%;
				margin-left: auto;
				margin-right: auto;
			}

			@media(min-width: 30em){
				.wrap{
					width: 490px;
				}
				.sudoku-board input {
					font-size: 24px;
					font-size: 1.5rem;
				}
				.sudoku-board .candidates {
					font-size: .8em;
				}
			}
 .btn{
 padding:8px 12px;
 }
 .switch {
  position: relative;
  display: inline-block;
  width: 60px;
  height: 34px;
}

.switch input { 
  opacity: 0;
  width: 0;
  height: 0;
}

.slider {
  position: absolute;
  cursor: pointer;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background-color: #ccc;
  -webkit-transition: .4s;
  transition: .4s;
}

.slider:before {
  position: absolute;
  content: "";
  height: 26px;
  width: 26px;
  left: 4px;
  bottom: 4px;
  background-color: white;
  -webkit-transition: .4s;
  transition: .4s;
}

input:checked + .slider {
  background-color: #2196F3;
}

input:focus + .slider {
  box-shadow: 0 0 1px #2196F3;
}

input:checked + .slider:before {
  -webkit-transform: translateX(26px);
  -ms-transform: translateX(26px);
  transform: translateX(26px);
}

/* Rounded sliders */
.slider.round {
  border-radius: 34px;
}

.slider.round:before {
  border-radius: 50%;
}
		</style>

		<title>SudokuJS - This Sudoku game is licensed under the MIT license</title>


		<script type="text/javascript" src="./jquery371.min.js"></script>
		<script type="text/javascript" src="./sudokuJS.js"></script>
	</head>

	<body>
	<div style="background-color: #262626 !important;text-align:center;  color: #fff !important;"><h1>SODOKU</h1></div>
	<div class="wrap">
	
		
		<!--genrate board btns-->
		<!--New Game:<br />
		<button type="button" class="sudokubutton1 js-generate-board-btn--easy btn">Easy</button>
		<button type="button" class="sudokubutton2 js-generate-board-btn--medium btn">Medium</button>
		<button type="button" class="sudokubutton3 js-generate-board-btn--hard btn">Hard</button>
		<button type="button" class="sudokubutton4 js-generate-board-btn--very-hard btn">Very Hard</button>-->
<br /><br />

		<!--the only required html-->
		<div id="sudoku" class="sudoku-board">
		</div>
		HINT :<label for="toggleCandidates" class="switch">HINT
  <input id="toggleCandidates" class="js-candidate-toggle" type="checkbox">
  <span class="slider"></span>
</label>
		<br>
		
		<!--solve buttons-->
		Solve: <button type="button" class="sudokubutton5 js-solve-step-btn btn">One Step</button><button type="button" class="sudokubutton6 js-solve-all-btn btn">All</button>
		 <a href="./"></a><button type="button" class="sudokubutton6 js-clear-board-btn btn">New Game</button></a>
		 
	
	</div>

	<script>
		var	$candidateToggle = $(".js-candidate-toggle"),
			$generateBoardBtnEasy = $(".js-generate-board-btn--easy"),
			$generateBoardBtnMedium = $(".js-generate-board-btn--medium"),
			$generateBoardBtnHard = $(".js-generate-board-btn--hard"),
			$generateBoardBtnVeryHard = $(".js-generate-board-btn--very-hard"),

			$solveStepBtn = $(".js-solve-step-btn"),
			$solveAllBtn = $(".js-solve-all-btn"),
			$clearBoardBtn = $(".js-clear-board-btn"),

			mySudokuJS = $("#sudoku").sudokuJS({
				difficulty: "very hard"
				//change state of our candidate showing checkbox on change in sudokuJS
				,candidateShowToggleFn : function(showing){
					$candidateToggle.prop("checked", showing);
				}
			});

		$solveStepBtn.on("click", mySudokuJS.solveStep);
		$solveAllBtn.on("click", mySudokuJS.solveAll);
		$clearBoardBtn.on("click", mySudokuJS.clearBoard);

		$generateBoardBtnEasy.on("click", function(){
			mySudokuJS.generateBoard("easy");
		});
		$generateBoardBtnMedium.on("click", function(){
			mySudokuJS.generateBoard("medium");
		});
		$generateBoardBtnHard.on("click", function(){
			mySudokuJS.generateBoard("hard");
		});
		$generateBoardBtnVeryHard.on("click", function(){
			mySudokuJS.generateBoard("very hard");
		});

		$candidateToggle.on("change", function(){
			if($candidateToggle.is(":checked"))
				mySudokuJS.showCandidates();
			else
				mySudokuJS.hideCandidates();
		});
		$candidateToggle.trigger("change");
	</script>
	</body>
</html>
